<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 모션 인식 테스트 - 졸라맨 스캐너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center min-h-screen p-5 text-white font-sans">

    <div class="max-w-2xl w-full bg-gray-800 rounded-xl shadow-2xl p-6 border-t-8 border-green-500">
        <h1 class="text-3xl font-bold text-center mb-2 italic text-green-400">👁️ AI 모션 스캐너</h1>
        <p class="text-center text-gray-400 mb-6 text-sm">"카메라 앞에서 움직여보십쇼. AI가 형님의 뼈대를 추적합니다."</p>

        <div class="relative flex justify-center bg-black rounded-lg overflow-hidden border-2 border-gray-700" style="min-height: 300px;">
            
            <video id="input_video" class="hidden" autoplay playsinline></video>
            
            <canvas id="output_canvas" class="w-full h-auto max-w-full" width="640" height="480"></canvas>
            
            <div id="loading" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 z-10 text-center p-4">
                <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-green-500 mb-4"></div>
                <p class="font-bold text-lg text-green-400">카메라를 켜는 중입니다... ⏳</p>
                <p class="text-sm text-gray-300 mt-2">🚨 브라우저에서 <b class="text-white">"카메라 권한 허용"</b>을 반드시 눌러주십쇼!</p>
            </div>
        </div>

        <p class="text-center text-xs text-gray-500 mt-4">
            * 이 데이터는 서버로 1바이트도 전송되지 않으며, 형님의 스마트폰/PC 칩셋으로만 돌아갑니다. (서버비 0원)
        </p>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingIndicator = document.getElementById('loading');

        // AI가 화면을 보고 뼈대를 찾았을 때 실행되는 함수
        function onResults(results) {
            // 카메라가 켜지고 뼈대를 찾으면 로딩창 숨기기
            loadingIndicator.style.display = 'none';

            // 캔버스 초기화 (이전 프레임 지우기)
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // 1. 카메라 원래 화면을 먼저 깔고
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // 2. 그 위에 발견된 뼈대(랜드마크)를 빨간 점과 초록 선으로 그리기!
            if (results.poseLandmarks) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4}); // 뼈대 선
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2, radius: 4}); // 관절 점
            }
            canvasCtx.restore();
        }

        // 구글 Pose(자세 인식) AI 모델 세팅
        const pose = new Pose({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }});

        pose.setOptions({
            modelComplexity: 1, // 0은 가볍고 빠름, 1은 중간, 2는 무겁고 정확
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        pose.onResults(onResults);

        // 카메라 켜기 및 영상 프레임을 AI에게 계속 넘겨주기
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await pose.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        // 카메라 작동 시작!
        camera.start();
    </script>
</body>
</html>
