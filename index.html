<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도파민 차단기 - 견훤의 분노</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-5 text-gray-800 font-sans">

    <div class="max-w-2xl w-full bg-white rounded-xl shadow-lg p-6 border-t-8 border-red-600" id="mainContainer">
        
        <div id="startScreen" class="text-center py-10">
            <h1 class="text-3xl font-bold text-red-600 mb-4">🔒 유튜브 집중 모드</h1>
            <p class="text-gray-600 mb-8">스쿼트 5개를 해야 잠금이 풀립니다.<br>중간에 포기하면 끔찍한 일이 발생합니다.</p>
            <button onclick="startApp()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full shadow-lg text-xl animate-pulse">
                운동 시작하기 (클릭 필수)
            </button>
        </div>

        <div id="appScreen" class="hidden">
            <div id="statusHeader" class="text-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">🔥 스쿼트 카운터</h2>
                <p class="text-gray-500">움직임을 멈추면 안 됩니다!</p>
            </div>

            <div class="relative flex justify-center bg-gray-50 rounded-lg overflow-hidden border-2 border-gray-300" style="min-height: 400px;" id="cameraArea">
                <video id="input_video" class="hidden" autoplay playsinline></video>
                <canvas id="output_canvas" class="w-full h-auto max-w-full" width="640" height="480"></canvas>
                
                <div class="absolute top-4 left-4 bg-white/90 px-4 py-2 rounded-lg border border-gray-200 shadow">
                    <p class="text-lg font-bold text-gray-800">개수: <span id="squatCount" class="text-3xl text-red-600">0</span> / 5</p>
                    <p class="text-sm text-gray-500 mt-1">상태: <span id="squatState">대기중</span></p>
                </div>
            </div>
        </div>

        <div id="penaltyArea" class="hidden w-full mt-4">
            <h2 class="text-2xl font-bold text-red-600 mb-4 text-center">🚨 늙었어!! 형편없이 늙어버렸어!!</h2>
            <div class="aspect-w-16 aspect-h-9 relative" style="padding-bottom: 56.25%;">
                <iframe id="youtubePlayer" class="absolute top-0 left-0 w-full h-full rounded-lg" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
            <button onclick="location.reload()" class="w-full mt-6 bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-4 rounded-lg">다시 도전하기</button>
        </div>

    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        
        const countDisplay = document.getElementById('squatCount');
        const stateDisplay = document.getElementById('squatState');
        const startScreen = document.getElementById('startScreen');
        const appScreen = document.getElementById('appScreen');
        const cameraArea = document.getElementById('cameraArea');
        const penaltyArea = document.getElementById('penaltyArea');

        let count = 0;
        let state = "UP"; 
        const TARGET_SQUATS = 5; 
        let lastSquatTime = 0; 
        let penaltyTriggered = false;

        // 🚨 형님이 주신 뼈 때리는 견훤 영상 ID
        const PENALTY_VIDEO_ID = "znDkW_8oZsI"; 

        // 각도 계산 수학 공식
        function calculateAngle(a, b, c) {
            let radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) angle = 360 - angle;
            return angle;
        }

        // 🚨 패널티 실행 함수: 껍데기만 있던 아이프레임에 주소를 꽂아버림!
        function triggerPenalty() {
            penaltyTriggered = true; // 패널티 발동! (뼈대 그리기 중지)
            cameraArea.classList.add('hidden'); // 카메라 화면 숨기기
            penaltyArea.classList.remove('hidden'); // 패널티 화면 켜기
            
            // 주소 뒤에 ?autoplay=1 을 붙여서 로딩되자마자 강제 재생시킵니다.
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${PENALTY_VIDEO_ID}?autoplay=1&playsinline=1`;
        }

        function onResults(results) {
            // 패널티가 켜지면 AI 연산 멈춤 (폰 과부하 방지)
            if(penaltyTriggered) return; 

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks && count < TARGET_SQUATS) {
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, results.poseLandmarks, {color: '#FF0000', lineWidth: 2, radius: 4});

                const hip = results.poseLandmarks[23];
                const knee = results.poseLandmarks[25];
                const ankle = results.poseLandmarks[27];

                if (hip.visibility > 0.5 && knee.visibility > 0.5 && ankle.visibility > 0.5) {
                    const angle = calculateAngle(hip, knee, ankle);

                    if (angle < 90) {
                        if (state === "UP") {
                            state = "DOWN";
                            stateDisplay.innerText = "내려감! 📉";
                        }
                    } else if (angle > 150) {
                        if (state === "DOWN") {
                            state = "UP";
                            count++; 
                            countDisplay.innerText = count;
                            stateDisplay.innerText = "올라옴! 📈";
                            
                            lastSquatTime = new Date().getTime(); // 스쿼트 할 때마다 시간 갱신!

                            if (count >= TARGET_SQUATS) {
                                alert("성공하셨습니다 형님! (운동 완료 로직)");
                            }
                        }
                    }
                }
                
                // 🔥 패널티 발동 조건: 1개 이상 했고 & 목표개수 못 채웠는데 & 5초 넘게 멈춰있으면!
                const currentTime = new Date().getTime();
                if (currentTime - lastSquatTime > 5000 && count > 0 && count < TARGET_SQUATS) {
                    triggerPenalty();
                }
            }
            canvasCtx.restore();
        }

        // 시작 버튼 누르면 실행
        function startApp() {
            startScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            lastSquatTime = new Date().getTime(); // 타이머 시작!

            const pose = new Pose({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
            }});
            pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            pose.onResults(onResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => { await pose.send({image: videoElement}); },
                width: 640, height: 480
            });
            camera.start();
        }
    </script>
</body>
</html>
